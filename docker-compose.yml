version: '3.8'

services:
  web:
    build: .
    container_name: qr-colmenas-web
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./output:/app/output
    environment:
      - FLASK_ENV=development
      - FLASK_APP=app.py
    command: python app.py
    restart: unless-stopped
    networks:
      - qr-colmenas

networks:
  qr-colmenas:
    driver: bridge
